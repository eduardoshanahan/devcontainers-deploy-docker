---
# =============================================================================
# STAGING ENVIRONMENT CONFIGURATION
# =============================================================================
# This file contains staging-specific overrides
# Staging should mirror production but with test data
# =============================================================================

# =============================================================================
# SERVER CONFIGURATION
# =============================================================================
vps_server_ip: "vps-153d27d0.vps.ovh.net"
initial_deployment_user: "ubuntu"
initial_deployment_ssh_key: "~/.ssh/ovh-initial-ubuntu"

# =============================================================================
# FIREWALL CONFIGURATION
# =============================================================================
configure_firewall_enabled: true
configure_firewall_default_policy: "DROP"
configure_firewall_allowed_ports:
  - 22   # SSH
  - 80   # HTTP
  - 443  # HTTPS

# Docker networks for firewall rules (SAME as production)
configure_firewall_docker_networks:
  - "172.20.0.0/16"  # web-network
  - "172.21.0.0/16"  # db-network
  - "172.22.0.0/16"  # monitoring-network

# =============================================================================
# DOCKER DEPLOYMENT CONFIGURATION
# =============================================================================
deploy_docker_clean_slate: false  # Safe for staging
configure_docker_networks_remove_all: false  # Safe for staging

# =============================================================================
# FEATURE FLAGS
# =============================================================================
# Control which features are enabled for this environment
features:
  containers:
    networks:
      test_mode: true  # Enable Docker network creation tests in staging
